name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package theme
        run: zip -r mdbook-gruvbox.zip gruvbox/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: mdbook-gruvbox.zip
          generate_release_notes: true
